<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div class="topbar">
        <div class="topbar__nav">
            <p class="topbar__logo">NexFlow</p>
            <nav>
                <span>Integrations</span>
                <span>Changelog</span>
                <span>Help</span>
                <span>Careers</span>
                <span>Pricing</span>
            </nav>
        </div>
        <div class="topbar__actions">
            <button class="btn btn--secondary">Sign In</button>
            <button class="btn btn--primary">Start for free</button>
        </div>
    </div>

    <div class="hero">
        <div class="hero__content">
            <div class="event-bar">
            <span class="event-bar__badge">Aug 4th</span>
            <span class="event-bar__text">In SF? Join our in-person onboardings</span>
            <span class="event-bar__arrow">›</span>
            </div>
            <h1 class="hero__heading">Automate your<br>dev workflows. Finally.</h1>
            <p class="hero__subtext">Connect GitHub, Jira, Slack and Notion in minutes.<br>No code required.</p>
            <div class="hero__actions">
            <button class="btn btn--primary">Start building for free</button>
            <button class="btn btn--secondary">See how it works</button>
            </div>
        </div>
    </div>

    <main>
        <section class="product-video">
            <img src="./img/video.png" alt="NexFlow video" />
        </section>
        <section class="product-logos">
            <img src="./img/logos.png" alt="Logos"/>
        </section>
    </main>
    <!-- <section class="product-video">
        <img src="./video.png" alt="NexFlow dashboard" />
    </section> -->

</body>
</html>
